<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="Animated 3D-style smart campus architecture visual">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071a2e"/>
      <stop offset="45%" stop-color="#0e2a48"/>
      <stop offset="100%" stop-color="#12335a"/>
    </linearGradient>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ed6ff"/>
      <stop offset="100%" stop-color="#4aaeff"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f8de3"/>
      <stop offset="100%" stop-color="#206fbc"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6db6"/>
      <stop offset="100%" stop-color="#174d84"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <g opacity="0.35">
    <circle cx="120" cy="68" r="4" fill="#95d8ff"/>
    <circle cx="250" cy="52" r="3" fill="#8bd0ff"/>
    <circle cx="960" cy="58" r="4" fill="#9fddff"/>
    <circle cx="1090" cy="78" r="3" fill="#8ccfff"/>
    <circle cx="1020" cy="350" r="4" fill="#95d8ff"/>
    <circle cx="180" cy="356" r="3" fill="#8ccfff"/>
  </g>

  <g transform="translate(600 210)">
    <ellipse cx="0" cy="126" rx="220" ry="34" fill="#02203d" opacity="0.65"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M190 122 L462 174" stroke="#59c0ff" stroke-width="2" stroke-dasharray="7 9" opacity="0.72">
      <animate attributeName="stroke-dashoffset" values="0;16" dur="1.4s" repeatCount="indefinite"/>
    </path>
    <path d="M1008 122 L736 174" stroke="#59c0ff" stroke-width="2" stroke-dasharray="7 9" opacity="0.72">
      <animate attributeName="stroke-dashoffset" values="0;16" dur="1.4s" repeatCount="indefinite"/>
    </path>
    <path d="M190 304 L462 246" stroke="#59c0ff" stroke-width="2" stroke-dasharray="7 9" opacity="0.72">
      <animate attributeName="stroke-dashoffset" values="0;16" dur="1.4s" repeatCount="indefinite"/>
    </path>
    <path d="M1008 304 L736 246" stroke="#59c0ff" stroke-width="2" stroke-dasharray="7 9" opacity="0.72">
      <animate attributeName="stroke-dashoffset" values="0;16" dur="1.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <g>
    <g transform="translate(600 210)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -7;0 0" dur="3.6s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" additive="sum" type="rotate" values="-3 0 0;3 0 0;-3 0 0" dur="6.4s" repeatCount="indefinite"/>

        <polygon points="0,-108 138,-46 0,16 -138,-46" fill="url(#topFace)"/>
        <polygon points="-138,-46 0,16 0,156 -138,94" fill="url(#leftFace)"/>
        <polygon points="138,-46 0,16 0,156 138,94" fill="url(#rightFace)"/>

        <polygon points="0,-74 86,-36 0,2 -86,-36" fill="#c8edff" opacity="0.42"/>
        <polygon points="-96,-18 -36,8 -36,94 -96,68" fill="#89c7f3" opacity="0.36"/>
        <polygon points="96,-18 36,8 36,94 96,68" fill="#73b8ea" opacity="0.32"/>
      </g>
    </g>
  </g>

  <g font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="#d9f2ff">
    <text x="112" y="128">Attendance</text>
    <text x="986" y="128" text-anchor="end">Remedial</text>
    <text x="126" y="310">Food</text>
    <text x="1022" y="310" text-anchor="end">Admin Insights</text>
  </g>

  <g>
    <circle cx="190" cy="122" r="9" fill="#57beff">
      <animate attributeName="r" values="8;10;8" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1008" cy="122" r="9" fill="#57beff">
      <animate attributeName="r" values="8;10;8" dur="1.8s" begin="0.25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="304" r="9" fill="#57beff">
      <animate attributeName="r" values="8;10;8" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1008" cy="304" r="9" fill="#57beff">
      <animate attributeName="r" values="8;10;8" dur="1.8s" begin="0.75s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#c9e9ff">
    <text x="600" y="372" text-anchor="middle">Unified Smart Campus Platform</text>
  </g>
</svg>
