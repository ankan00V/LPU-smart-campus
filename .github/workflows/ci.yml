name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality Gate (Migrations + Lint + Tests)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest ruff

      - name: Migration Gate
        run: PYTHONPATH=. python scripts/check_migrations.py

      - name: Lint
        run: PYTHONPATH=. python -m ruff check app tests scripts

      - name: Test Suite
        env:
          REMEDIAL_USE_UTC_NOW: "true"
        run: PYTHONPATH=. python -m pytest -q

  ux-gate:
    name: UX Gate (Playwright + Lighthouse)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: Run UX Gates
        run: npm run ux:gates

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Lighthouse Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lhci_reports
          if-no-files-found: ignore

  security-gate:
    name: Security Gate (SAST + Dependency Audit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install bandit pip-audit

      - name: Bandit (High Severity Only)
        run: PYTHONPATH=. python -m bandit -q -r app scripts -x tests -lll

      - name: pip-audit
        run: |
          mkdir -p .pip-audit-cache
          python -m pip_audit --cache-dir .pip-audit-cache -r requirements.txt
