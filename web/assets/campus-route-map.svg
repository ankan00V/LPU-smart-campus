<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">LPU Smart Campus Route Map</title>
  <desc id="desc">Offline campus route map placeholder showing major academic, residential, and transit zones.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecf7ff"/>
      <stop offset="55%" stop-color="#dff0fb"/>
      <stop offset="100%" stop-color="#c8e2f4"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2c79bf"/>
      <stop offset="100%" stop-color="#4ba7d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0d3558" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect x="28" y="28" width="1224" height="744" rx="28" fill="none" stroke="#7fb6d8" stroke-width="2"/>

  <g opacity="0.22">
    <circle cx="1120" cy="120" r="120" fill="#8dcaf0"/>
    <circle cx="170" cy="690" r="150" fill="#9ed4f3"/>
    <circle cx="680" cy="110" r="88" fill="#b3def6"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M120 160 H1160" stroke="url(#road)" stroke-width="22" stroke-linecap="round"/>
    <path d="M190 300 H1085" stroke="url(#road)" stroke-width="18" stroke-linecap="round"/>
    <path d="M150 470 H1125" stroke="url(#road)" stroke-width="20" stroke-linecap="round"/>
    <path d="M235 650 H1045" stroke="url(#road)" stroke-width="16" stroke-linecap="round"/>
    <path d="M260 120 V690" stroke="url(#road)" stroke-width="16" stroke-linecap="round"/>
    <path d="M515 140 V680" stroke="url(#road)" stroke-width="20" stroke-linecap="round"/>
    <path d="M780 120 V690" stroke="url(#road)" stroke-width="16" stroke-linecap="round"/>
    <path d="M1025 150 V650" stroke="url(#road)" stroke-width="18" stroke-linecap="round"/>
  </g>

  <g fill="#ffffff" stroke="#8cbddd" stroke-width="2" filter="url(#shadow)">
    <rect x="84" y="76" width="320" height="78" rx="18"/>
    <rect x="914" y="76" width="282" height="78" rx="18"/>
    <rect x="105" y="216" width="220" height="94" rx="18"/>
    <rect x="360" y="216" width="240" height="94" rx="18"/>
    <rect x="630" y="216" width="260" height="94" rx="18"/>
    <rect x="940" y="216" width="200" height="94" rx="18"/>
    <rect x="122" y="388" width="250" height="104" rx="18"/>
    <rect x="415" y="390" width="220" height="104" rx="18"/>
    <rect x="690" y="388" width="270" height="104" rx="18"/>
    <rect x="990" y="390" width="170" height="104" rx="18"/>
    <rect x="150" y="564" width="260" height="108" rx="18"/>
    <rect x="470" y="564" width="260" height="108" rx="18"/>
    <rect x="810" y="564" width="250" height="108" rx="18"/>
  </g>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#173e61">
    <text x="110" y="124" font-size="32" font-weight="800">LPU Smart Campus Route Map</text>
    <text x="110" y="148" font-size="16" fill="#53718a">Offline bundled asset for local and production-safe startup.</text>

    <text x="940" y="124" font-size="18" font-weight="700">Legend</text>
    <text x="940" y="150" font-size="15" fill="#4b6b86">Blue corridors: primary movement routes</text>

    <text x="135" y="255" font-size="22" font-weight="700">Main Gate</text>
    <text x="135" y="282" font-size="15" fill="#56738c">Entry and security</text>

    <text x="390" y="255" font-size="22" font-weight="700">Academic Block</text>
    <text x="390" y="282" font-size="15" fill="#56738c">Teaching and labs</text>

    <text x="660" y="255" font-size="22" font-weight="700">UniMall / Food Hall</text>
    <text x="660" y="282" font-size="15" fill="#56738c">Retail and dining zone</text>

    <text x="970" y="255" font-size="22" font-weight="700">Library</text>
    <text x="970" y="282" font-size="15" fill="#56738c">Study and research</text>

    <text x="152" y="430" font-size="22" font-weight="700">Boys Hostels</text>
    <text x="152" y="458" font-size="15" fill="#56738c">Residential cluster</text>

    <text x="445" y="430" font-size="22" font-weight="700">Auditorium</text>
    <text x="445" y="458" font-size="15" fill="#56738c">Events and convocations</text>

    <text x="718" y="430" font-size="22" font-weight="700">Administrative Block</text>
    <text x="718" y="458" font-size="15" fill="#56738c">Approvals and services</text>

    <text x="1015" y="430" font-size="22" font-weight="700">Transit Hub</text>
    <text x="1015" y="458" font-size="15" fill="#56738c">Pickup and shuttle point</text>

    <text x="180" y="608" font-size="22" font-weight="700">Girls Hostels</text>
    <text x="180" y="636" font-size="15" fill="#56738c">Residential cluster</text>

    <text x="500" y="608" font-size="22" font-weight="700">Sports Complex</text>
    <text x="500" y="636" font-size="15" fill="#56738c">Grounds and recreation</text>

    <text x="840" y="608" font-size="22" font-weight="700">Placement / Career Cell</text>
    <text x="840" y="636" font-size="15" fill="#56738c">Interviews and support</text>
  </g>
</svg>
